services:
  app:
    build:
      context: .
      dockerfile: dockerfile
      args:
        INSTALL_DEV: "true"      # include PHPUnit and other dev deps
    environment:
      APP_ENV: testing
      APP_KEY: base64:dGVzdGtleWZvcmNpY2Rub3RmcmVhbHByb2Q=   # dummy key for CI only
      DB_CONNECTION: sqlite
      DB_DATABASE: ":memory:"
      CACHE_STORE: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
    # no depends_on — tests use SQLite in-memory, no Postgres needed
