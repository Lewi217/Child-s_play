services:
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: jenkins
    restart: unless-stopped
    privileged: true                  # needed so Jenkins can run Docker commands
    user: root                        # needed to access the Docker socket
    ports:
      - "8080:8080"                   # Jenkins UI
      - "50000:50000"                 # Jenkins agent protocol
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock   # lets Jenkins run docker commands
      - /usr/bin/docker:/usr/bin/docker             # docker binary on the host
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false   # skip setup wizard (optional)
    networks:
      - jenkins_network

volumes:
  jenkins_home:

networks:
  jenkins_network:
    driver: bridge
