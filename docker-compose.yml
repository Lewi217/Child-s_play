services:
  app:
    build:
      context: .
      dockerfile: dockerfile
    container_name: childs_play_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./storage:/var/www/storage
    ports:
      - "8000:80"
    environment:
      APP_ENV: local
      APP_KEY: base64:Qwn4iFyM9gY/OYhZDxZd/l5EJaFoW7YsfsO91qUWHUE=
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: childs_play
      DB_USERNAME: lewis
      DB_PASSWORD: gakpo901
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
    depends_on:
      db:
        condition: service_healthy
    networks:
      - childs_play_network

  db:
    image: postgres:15-alpine
    container_name: childs_play_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: childs_play
      POSTGRES_USER: lewis
      POSTGRES_PASSWORD: gakpo901
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lewis -d childs_play"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - childs_play_network

volumes:
  postgres_data:

networks:
  childs_play_network:
    driver: bridge
